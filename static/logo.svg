<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue rounded square background -->
  <rect width="100" height="100" rx="22" fill="#1e40af"/>

  <!-- White newspaper page -->
  <rect x="19" y="15" width="50" height="62" rx="5" fill="white"/>

  <!-- Folded corner (top-right) -->
  <path d="M55 15 L69 15 L69 29 Z" fill="#dbeafe"/>
  <path d="M55 15 L55 29 L69 29 Z" fill="#bfdbfe"/>

  <!-- Masthead / headline bar in blue -->
  <rect x="23" y="20" width="28" height="8" rx="2" fill="#1e40af"/>

  <!-- Subheading lines -->
  <rect x="23" y="34" width="42" height="4.5" rx="2" fill="#93c5fd"/>
  <rect x="23" y="43" width="34" height="3.5" rx="1.75" fill="#bfdbfe"/>

  <!-- Divider -->
  <rect x="23" y="52" width="42" height="1.5" rx=".75" fill="#dbeafe"/>

  <!-- Body text lines -->
  <rect x="23" y="58" width="42" height="3" rx="1.5" fill="#dbeafe"/>
  <rect x="23" y="65" width="36" height="3" rx="1.5" fill="#dbeafe"/>
  <rect x="23" y="72" width="39" height="3" rx="1.5" fill="#dbeafe"/>
</svg>
